<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juno Vault | Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; overflow: hidden; }
        .fade-in { animation: fadeIn 3s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .vault-item { transition: all 0.4s; cursor: pointer; }
        #lightbox { transition: opacity 0.4s ease; }
    </style>
</head>
<body>

    <button onclick="showVault()" class="fixed top-6 right-6 z-[500] text-[10px] tracking-[0.2em] text-white/30 hover:text-white/80 uppercase transition-all duration-700">
        Belki Hatırlarsın
    </button>

    <div id="main-view" class="flex items-center justify-center min-h-screen w-full bg-black">
        <h1 class="text-white text-xl md:text-2xl font-light tracking-[0.3em] fade-in italic">
            Eyüp artık çok uzaklarda
        </h1>
    </div>

    <div id="view-vault" class="fixed inset-0 z-[400] bg-black hidden overflow-y-auto p-8 md:p-24">
        <div class="max-w-6xl mx-auto pb-20">
            <header class="flex justify-between items-center mb-16 border-b border-white/10 pb-8">
                <h1 class="text-sm font-light tracking-widest uppercase text-white/50">Eski Anılar</h1>
                <button onclick="hideVault()" class="text-white/30 hover:text-white">Geri Dön</button>
            </header>
            <div id="vault-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
    </div>

    <div id="lightbox" class="fixed inset-0 z-[600] bg-black/95 hidden items-center justify-center p-6 opacity-0 pointer-events-none">
        <button onclick="closeLightbox()" class="absolute top-8 right-8 text-2xl text-white/30">&times;</button>
        <div class="max-w-4xl w-full flex flex-col items-center">
            <div id="lb-content" class="w-full flex justify-center"></div>
            <p id="lb-desc" class="text-gray-400 italic mt-6 text-center text-sm px-4"></p>
        </div>
    </div>

    <script>
        const messages = { 
            1: "Hayvanlara sevgin, kalbimi çalan noktalar...", 
            // ... (Eski mesajların burada durabilir, silmedim)
            136: "Ve şimdilik sonuncusu!"
        };

        let data = [];
        // Fotoğraflar
        for(let i=1; i<=136; i++) {
            data.push({ id: i, t: 'photo', s: `medya/${i}.jpg`, d: messages[i] || "" });
        }
        // Videolar
        ['a', 'b', 'c', 'd', 'e'].forEach(vid => {
            data.push({ id: vid, t: 'video', s: `medya/${vid}.mp4`, d: "Video Anısı" });
        });

        function showVault() {
            document.getElementById('view-vault').classList.remove('hidden');
            const grid = document.getElementById('vault-grid');
            if(grid.children.length === 0) {
                data.forEach((item, idx) => {
                    const c = document.createElement('div');
                    c.className = 'glass p-2 rounded-xl vault-item aspect-square overflow-hidden flex items-center justify-center';
                    if(item.t === 'video') {
                        c.innerHTML = `<div class="text-xs text-white/20">Video</div>`;
                    } else {
                        c.innerHTML = `<img src="${item.s}" class="w-full h-full object-cover rounded-lg opacity-40 hover:opacity-100 transition-opacity duration-700" onerror="this.parentElement.remove();">`;
                    }
                    c.onclick = () => openLightbox(item);
                    grid.appendChild(c);
                });
            }
        }

        function hideVault() {
            document.getElementById('view-vault').classList.add('hidden');
        }

        function openLightbox(item) {
            const lb = document.getElementById('lightbox');
            const content = document.getElementById('lb-content');
            if(item.t === 'video') {
                content.innerHTML = `<video src="${item.s}" controls class="max-h-[70vh] rounded-lg"></video>`;
            } else {
                content.innerHTML = `<img src="${item.s}" class="max-h-[70vh] rounded-lg object-contain">`;
            }
            document.getElementById('lb-desc').innerText = item.d;
            lb.classList.replace('hidden', 'flex');
            setTimeout(() => { lb.style.opacity = '1'; lb.style.pointerEvents = 'auto'; }, 10);
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.style.opacity = '0';
            lb.style.pointerEvents = 'none';
            setTimeout(() => lb.classList.replace('flex', 'hidden'), 400);
        }
    </script>
</body>
</html>
